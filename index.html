<!DOCTYPE html>
<html lang="en">
  <body>
    <div id="app">

      <!-- Primary working canvas -->
      <canvas
        id="main"
        width="800"
        height="600"
        data-action="RegionSelector PivotPlacement TransformController KeyframeValueEditor"
        data-source="#main">
      </canvas>


      <div id="ui-container">

        <!-- Timeline -->
        <div class="ui-section">
          <canvas
          id="timeline"
          width="800"
          height="60"
          data-action="TimelineUI KeyframeEditor"
          data-source="#timeline">
        </canvas>

        </div>

        <!-- Playback -->
        <div class="ui-section">
          <button
            id="play"
            data-action="PlaybackController"
            data-source="#play">
            Play
          </button>
        </div>

      </div>

      <!-- Secondary canvas (preview, future steps) -->
      <canvas id="preview" width="800" height="200"></canvas>

    </div>

    <!-- UI Loader -->
    <script type="module">
      import { loadUI } from './src/ui/ui-loader.js';
      import { uiState } from './src/ui/ui-state.js';
      import { drawFrame } from './src/ui/draw-frame.js';

      let playbackControllerRef = null;

      window.addEventListener('DOMContentLoaded', () => {
        loadUI(uiState, drawFrame, playbackControllerRef);
      });
    </script>
  </body>
</html>
