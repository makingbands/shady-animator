<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Shady Animator</title>
  <!-- Consolidated stylesheet -->
  <link rel="stylesheet" href="./css/styles.css" />
</head>

<body>
  <div id="app">

    <!-- Primary working canvas -->
    <canvas
      id="main"
      width="800"
      height="600"
      data-action="RegionSelector"
      data-source="#main"
    ></canvas>

    <!-- Secondary canvas (preview, transforms, future steps) -->
    <canvas
      id="preview"
      width="800"
      height="200"
    ></canvas>

  </div>

  <!-- UI Loader -->
  <script type="module">
    import { loadUI } from './src/ui/ui-loader.js';
    window.addEventListener('DOMContentLoaded', () => {
      loadUI();
    });
  </script>

</body>
</html>
